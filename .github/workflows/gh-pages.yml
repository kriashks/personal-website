name: Build & deploy website
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      output_dir:
        description: "Build output directory (dist | build | out | public)"
        default: "public"
        required: false

jobs:
# ------------------------------------------------------
# 1. Build once – outputs ./public as an artefact
# ------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    outputs:
      publish-dir: ${{ steps.upload.outputs.artifact-path }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build site
        env:
          OUTPUT_DIR: ${{ github.event.inputs.output_dir || 'public' }}
        run: |
          set -euo pipefail

          if [ -f package.json ]; then
            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi
            npm run build
          fi

          if [ "${OUTPUT_DIR}" != "public" ]; then
            if [ ! -d "${OUTPUT_DIR}" ]; then
              echo "Configured output_dir '${OUTPUT_DIR}' does not exist."
              exit 1
            fi
            rm -rf public
            mkdir -p public
            rsync -a "${OUTPUT_DIR}/" public/
          fi

          if [ "${OUTPUT_DIR}" = "public" ] && [ ! -f public/index.html ]; then
            for candidate in dist build out; do
              if [ -f "${candidate}/index.html" ]; then
                rm -rf public
                mkdir -p public
                rsync -a "${candidate}/" public/
                break
              fi
            done
          fi

          if [ "${OUTPUT_DIR}" = "public" ] && [ ! -f public/index.html ] && [ -f index.html ]; then
            mkdir -p public
            rsync -a \
              --exclude ".git/" \
              --exclude ".github/" \
              --exclude "node_modules/" \
              --exclude "public/" \
              ./ public/
          fi

          if [ ! -f public/index.html ]; then
            echo "Missing public/index.html after build. Set workflow_dispatch input output_dir correctly."
            exit 1
          fi

          echo "adarshkrishnan.com" > public/CNAME

      - name: Upload artefact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: public

# ------------------------------------------------------
# 2a. Default route – publish to GitHub Pages
# ------------------------------------------------------
  deploy-pages:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: site
          path: public
      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
