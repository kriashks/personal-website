<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>John Doe - Personal Website</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-gray-100 text-gray-900">
    <!-- Header Section -->
    <header class="bg-white shadow-md fade-in">
        <div class="container mx-auto p-4 flex justify-between items-center">
            <h1 class="text-2xl font-semibold">John Doe</h1>
            <nav>
                <a href="#about" class="text-gray-600 hover:text-gray-900 mx-2">About</a>
                <a href="#portfolio" class="text-gray-600 hover:text-gray-900 mx-2">Portfolio</a>
                <a href="#contact" class="text-gray-600 hover:text-gray-900 mx-2">Contact</a>
                <a href="#resume" class="text-gray-600 hover:text-gray-900 mx-2" onclick="toggleResume()">Resume</a>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto p-4">
        <!-- Include the external content files -->
        <div id="content"></div>
    </main>

    <!-- Footer Section -->
    <footer class="bg-white shadow-md mt-12 p-4 fade-in">
        <div class="container mx-auto text-center text-gray-600">
            © 2024 John Doe. All rights reserved.
        </div>
    </footer>

    <!-- JavaScript Files -->
    <script src="scripts.js"></script>
</body>

</html>
