<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>John Doe - Contact</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-gray-100 text-gray-900">
    <!-- Header Section -->
    <header class="bg-white shadow-md fade-in">
        <div class="container mx-auto p-4 flex justify-between items-center">
            <h1 class="text-2xl font-semibold">John Doe</h1>
            <nav>
                <a href="index.html" class="text-gray-600 hover:text-gray-900 mx-2">About</a>
                <a href="portfolio.html" class="text-gray-600 hover:text-gray-900 mx-2">Portfolio</a>
                <a href="contact.html" class="text-gray-600 hover:text-gray-900 mx-2">Contact</a>
                <a href="resume.html" class="text-gray-600 hover:text-gray-900 mx-2">Resume</a>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto p-4">
        <section id="contact" class="my-12 slide-up">
            <h2 class="text-3xl font-semibold mb-4">Contact</h2>
            <form class="bg-white rounded-lg shadow-md p-6">
                <div class="mb-4">
                    <label for="name" class="block text-gray-700">Name</label>
                    <input type="text" id="name" class="w-full mt-1 p-2 border border-gray-300 rounded-md">
                </div>
                <div class="mb-4">
                    <label for="email" class="block text-gray-700">Email</label>
                    <input type="email" id="email" class="w-full mt-1 p-2 border border-gray-300 rounded-md">
                </div>
                <div class="mb-4">
                    <label for="message" class="block text-gray-700">Message</label>
                    <textarea id="message" class="w-full mt-1 p-2 border border-gray-300 rounded-md"></textarea>
                </div>
                <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded-md hover:bg-blue-600 transition-transform transform hover:scale-105">Send</button>
            </form>
        </section>
    </main>

    <!-- Footer Section -->
    <footer class="bg-white shadow-md mt-12 p-4 fade-in">
        <div class="container mx-auto text-center text-gray-600">
            © 2024 John Doe. All rights reserved.
        </div>
    </footer>
</body>

</html>
